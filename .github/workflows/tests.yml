name: Tests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: intl, mbstring, xml, zip
          coverage: none

      - name: Install dependencies
        run: composer update --no-progress --prefer-dist

      - name: Run unit tests
        run: vendor/bin/phpunit -c Build/phpunit.xml --testsuite "Unit Tests" --no-coverage

  functional:
    name: Functional tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: intl, mbstring, xml, zip, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        run: composer update --no-progress --prefer-dist

      - name: Run functional tests
        run: vendor/bin/phpunit -c Build/phpunit.functional.xml --testsuite "Functional Tests"
